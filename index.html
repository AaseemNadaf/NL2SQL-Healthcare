<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MediQuery AI</title>
  <script src="https://js.puter.com/v2/"></script>
  <link rel="stylesheet" href="static/style.css">
</head>
<body>

<nav>
  <div class="nav-logo">
    <div class="nav-logo-icon">+</div>
    MediQuery AI
  </div>
  <div class="nav-links">
    <button class="nav-tab active" data-tab="query">Query</button>
    <button class="nav-tab" data-tab="schema">Schema</button>
    <button class="nav-tab" data-tab="history">History</button>
  </div>
  <div class="nav-status" id="db-status">
    <span class="dot"></span>Connecting...
  </div>
</nav>

<div id="page-query" class="page active">
  <div class="query-layout">

    <div class="panel">
      <div class="panel-header">
        <span class="panel-title">Natural Language Input</span>
      </div>
      <div class="panel-body">
        <textarea id="nl-input" placeholder="Enter text"></textarea>

        <button class="btn btn-primary" id="generate-btn">Generate SQL</button>

        <div>
          <div class="sample-prompts-label" style="margin-bottom:8px;">Sample Prompts</div>
          <div class="prompt-chips" id="prompt-chips"></div>
        </div>

        <div id="generating-alert" class="alert alert-info hidden">
          <span class="spinner"></span>
          Claude is generating your SQL query...
        </div>

        <div id="error-alert"   class="alert alert-error   hidden"></div>
        <div id="success-alert" class="alert alert-success hidden"></div>
      </div>
    </div>

    <div class="panel">
      <div class="panel-header">
        <span class="panel-title">SQL Query Output</span>
      </div>
      <div class="panel-body">

        <div class="sql-output-box" id="sql-output">
          <span class="sql-placeholder">Your generated SQL will appear here...</span>
        </div>

        <div id="review-section" class="hidden">
          <div class="action-row">
            <button class="btn btn-approve" id="approve-btn">Approve and Run</button>
            <button class="btn btn-deny"    id="deny-btn">Deny</button>
          </div>
        </div>

      </div>
    </div>

  </div>

  <div id="results-section" class="results-panel hidden" style="margin: 0 40px 40px;">
    <div class="results-header">
      <span class="results-title" id="results-count"></span>
      <button class="btn btn-ghost btn-sm" id="export-btn">Export CSV</button>
    </div>
    <div class="table-wrap">
      <table>
        <thead id="results-thead"></thead>
        <tbody id="results-tbody"></tbody>
      </table>
    </div>
  </div>
</div>

<div id="page-schema" class="page">
  <div class="schema-page">
    <div class="schema-page-title">Database Schema</div>
    <div class="schema-page-sub">mediquery_db — MySQL 8.0 — Healthcare Domain</div>
    <div class="summary-grid" id="summary-grid"></div>
    <div class="table-cards" id="table-cards"></div>
  </div>
</div>

<div id="page-history" class="page">
  <div class="history-page">
    <div class="history-page-header">
      <div class="history-page-title">Query History</div>
      <div style="display:flex;gap:8px;align-items:center;">
        <div style="display:flex;gap:20px;margin-right:16px;font-size:0.82rem;color:var(--text-3);">
          Total: <strong id="stat-total" style="color:var(--text)">0</strong>
          &nbsp; Approved: <strong id="stat-approved" style="color:var(--green)">0</strong>
          &nbsp; Denied: <strong id="stat-denied" style="color:var(--red)">0</strong>
        </div>
        <button class="btn btn-ghost btn-sm" id="export-history-btn">Export CSV</button>
        <button class="btn btn-sm" style="background:var(--red-dim);color:var(--red);border:1px solid rgba(255,92,92,0.3);" id="clear-history-btn">Clear</button>
      </div>
    </div>
    <div class="history-list" id="history-list">
      <div class="empty-state">No queries run yet.</div>
    </div>
  </div>
</div>

<script src="static/app.js"></script>
</body>
</html>
